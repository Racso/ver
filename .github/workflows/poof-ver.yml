# [poof-auto-ci] AUTO-GENERATED BY Poof! — CHANGES MAY BE OVERRIDDEN. DISABLE CI ON Poof! TO USE A CUSTOM FILE.
name: Poof! deploy (static)

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    if: vars.POOF_DISABLE != '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Poof!
        run: |
          tar -czf site.tar.gz -C . .
          curl -fsSL -X POST "${{ secrets.POOF_URL }}/projects/ver/deploy/static" \
            -H "Authorization: Bearer ${{ secrets.POOF_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @site.tar.gz
